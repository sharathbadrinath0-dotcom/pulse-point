name: Backend CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stop old PM2 processes
        run: pm2 stop all || true

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: yarn install

      - name: Install Frontend Dependencies & Build
        working-directory: ./frontend
        run: |
          yarn install
          rm -rf build
          yarn run build

      - name: Start PM2 Services
        run: |
          cd backend
          pm2 start server.js --name "backend" --update-env
          cd ..
          cd frontend
          pm2 serve build 3000 --name "frontend" --spa --update-env
          cd ..
          pm2 save
          echo "⏳ Waiting for backend to fully start (up to 30 seconds)..."

      - name: ✅ Backend Smoke Tests (Real API Tests)
        run: |
          echo "🔥 Starting backend smoke tests..."

          # Strong health check - wait until the server actually responds
          for i in {1..30}; do
            if curl -f -s http://localhost:5001/api/classes > /dev/null; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "⏳ Waiting... ($i/30)"
            sleep 1
          done

          # Real tests
          curl -f http://localhost:5001/api/classes || { echo "❌ Classes endpoint failed"; exit 1; }

          curl -f -X POST http://localhost:5001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test User","email":"ci-test-$(date +%s)@example.com","password":"password123"}' \
            || { echo "❌ Register failed"; exit 1; }

          echo "✅ All backend tests passed!"