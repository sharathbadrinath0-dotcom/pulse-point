name: Backend CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Stop any existing PM2 processes
        run: pm2 stop all || true

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: yarn install

      - name: Install Frontend Dependencies & Build
        working-directory: ./frontend
        run: |
          yarn install
          rm -rf build
          yarn run build

      - name: Restart PM2 Services
        run: |
          pm2 restart all || true
          pm2 save
          echo "⏳ Waiting for backend to start..."
          sleep 10

      - name: ✅ Backend Smoke Tests (Real API Tests)
        run: |
          echo "🔥 Starting backend smoke tests..."

          # Wait up to 15 seconds for server to be ready
          for i in {1..15}; do
            if curl -f -s http://localhost:5001/api/classes > /dev/null; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "⏳ Waiting for backend... ($i/15)"
            sleep 1
          done

          # Test 1: Classes endpoint
          curl -f http://localhost:5001/api/classes || { echo "❌ Classes endpoint failed"; exit 1; }

          # Test 2: Register endpoint
          curl -f -X POST http://localhost:5001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test User","email":"ci-test-$(date +%s)@example.com","password":"password123"}' \
            || { echo "❌ Register failed"; exit 1; }

          echo "✅ All backend tests passed!"